# This file centralizes all proxy headers sent to upstream services
# It is included inside each location to avoid duplication and ensure consistency

# Forward the original Host header to each service
proxy_set_header Host $host;

# Forward the real client IP address
proxy_set_header X-Real-IP $remote_addr;

# Forward the full chain of client IPs (useful when behind multiple proxies)
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

# Indicate whether the original request was made over HTTP or HTTPS
proxy_set_header X-Forwarded-Proto $scheme;