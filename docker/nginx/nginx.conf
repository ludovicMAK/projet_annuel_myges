upstream backend {
    server backend:3001;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;

    # Enable gzip compression to reduce response size and improve performance
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;

    # Security headers applied globally to all responses
    # WARNING: If a location block defines its own add_header,
    # these will NOT be inherited and must be redefined there.
    
    # Prevent the site from being embedded in iframes from other domains (clickjacking protection)
    add_header X-Frame-Options SAMEORIGIN;
    # Prevent MIME type sniffing (forces browser to respect declared content type)
    add_header X-Content-Type-Options nosniff;

    # Handle all API requests (backend)
    location /api/ {
        # Forward requests to the backend upstream
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Include shared proxy headers (Host, IP, protocol, etc.)
        include proxy_headers.conf;

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Handle all other requests (frontend)
    location / {
        # Forward requests to the frontend upstream
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        # Include shared proxy headers (Host, IP, protocol, etc.)
        include proxy_headers.conf;
    }
}