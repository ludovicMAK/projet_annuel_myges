<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyGES 2.0 — Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #F8F9FA; color: #191C1D; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,25,68,0.15); border-radius: 999px; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="tweaks-panel" style="display:none; position:fixed; bottom:24px; right:24px; z-index:9999; background:#fff; border:1.5px solid #E2E8F0; border-radius:16px; padding:20px; width:260px; box-shadow:0 8px 32px rgba(0,0,0,0.12); font-family:Inter,sans-serif;">
    <div style="font-weight:700; font-size:14px; color:#001944; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
      Tweaks
      <span id="tweaks-close" style="cursor:pointer; color:#94A3B8; font-size:18px; line-height:1;">×</span>
    </div>
    <div style="display:flex; flex-direction:column; gap:14px;">
      <div>
        <label style="font-size:11px; font-weight:600; color:#64748B; display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;">Couleur principale</label>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <div class="color-swatch" data-color="#001944" style="width:28px;height:28px;border-radius:8px;background:#001944;cursor:pointer;outline:2px solid #001944;outline-offset:2px;"></div>
          <div class="color-swatch" data-color="#0f3460" style="width:28px;height:28px;border-radius:8px;background:#0f3460;cursor:pointer;"></div>
          <div class="color-swatch" data-color="#1a2744" style="width:28px;height:28px;border-radius:8px;background:#1a2744;cursor:pointer;"></div>
          <div class="color-swatch" data-color="#2d1b69" style="width:28px;height:28px;border-radius:8px;background:#2d1b69;cursor:pointer;"></div>
          <div class="color-swatch" data-color="#1a3a2a" style="width:28px;height:28px;border-radius:8px;background:#1a3a2a;cursor:pointer;"></div>
        </div>
      </div>
      <div>
        <label style="font-size:11px; font-weight:600; color:#64748B; display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;">Changer de rôle</label>
        <select id="tweak-role" style="width:100%;padding:7px 10px;border-radius:8px;border:1px solid #E2E8F0;font-family:Inter;font-size:12px;color:#001944;outline:none;">
          <option value="etudiant">Étudiant Alternant</option>
          <option value="intervenant">Intervenant</option>
          <option value="scolarite">Administration Scolarité</option>
          <option value="superadmin">Super Administrateur</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px; font-weight:600; color:#64748B; display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px;">Densité</label>
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
          <input type="checkbox" id="tweak-compact" style="accent-color:#001944;" />
          <span style="font-size:12px; color:#374151;">Mode compact</span>
        </label>
      </div>
      <div style="padding-top:8px; border-top:1px solid #F1F5F9;">
        <button id="tweak-reset" style="width:100%; padding:8px; border-radius:8px; border:1px solid #E2E8F0; background:#fff; font-family:Inter; font-size:12px; color:#64748B; cursor:pointer;">Réinitialiser</button>
      </div>
    </div>
  </div>

  <script type="text/babel" src="myges/Sidebar.jsx"></script>
  <script type="text/babel" src="myges/TopBar.jsx"></script>
  <script type="text/babel" src="myges/Login.jsx"></script>
  <script type="text/babel" src="myges/DashboardEtudiant.jsx"></script>
  <script type="text/babel" src="myges/Planning.jsx"></script>
  <script type="text/babel" src="myges/Notes.jsx"></script>
  <script type="text/babel" src="myges/Absences.jsx"></script>
  <script type="text/babel" src="myges/Messagerie.jsx"></script>
  <script type="text/babel" src="myges/DashboardIntervenant.jsx"></script>
  <script type="text/babel" src="myges/DashboardAdmin.jsx"></script>
  <script type="text/babel" src="myges/DashboardSuperAdmin.jsx"></script>
  <script type="text/babel" src="myges/OtherViews.jsx"></script>
  <script type="text/babel" src="myges/MoreViews.jsx"></script>
  <script type="text/babel" src="myges/App.jsx"></script>

  <script>
    // Tweaks panel host integration
    window.addEventListener('message', function(e) {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').style.display = 'block';
      }
      if (e.data.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').style.display = 'none';
      }
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    document.getElementById('tweaks-close').addEventListener('click', function() {
      document.getElementById('tweaks-panel').style.display = 'none';
      window.parent.postMessage({ type: '__deactivate_edit_mode' }, '*');
    });

    document.querySelectorAll('.color-swatch').forEach(function(el) {
      el.addEventListener('click', function() {
        document.querySelectorAll('.color-swatch').forEach(function(s) { s.style.outline = 'none'; });
        el.style.outline = '2px solid ' + el.dataset.color;
        el.style.outlineOffset = '2px';
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: el.dataset.color } }, '*');
      });
    });

    document.getElementById('tweak-role').addEventListener('change', function(e) {
      // Switch role by updating localStorage and reloading
      localStorage.setItem('myges_role', e.target.value);
      localStorage.setItem('myges_page', 'dashboard');
      window.location.reload();
    });

    document.getElementById('tweak-compact').addEventListener('change', function(e) {
      document.body.style.fontSize = e.target.checked ? '13px' : '';
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { compactMode: e.target.checked } }, '*');
    });

    document.getElementById('tweak-reset').addEventListener('click', function() {
      localStorage.clear();
      window.location.reload();
    });
  </script>
</body>
</html>
