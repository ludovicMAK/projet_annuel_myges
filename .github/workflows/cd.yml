name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Kubernetes
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Update frontend & backend image tags in k8s manifests
        run: |
          sed -i "s|image: ghcr.io/aztymatt/myges-backend:.*|image: ghcr.io/aztymatt/myges-backend:${{ github.event.workflow_run.head_sha }}|" k8s/backend/deployment.yml
          sed -i "s|image: ghcr.io/aztymatt/myges-frontend:.*|image: ghcr.io/aztymatt/myges-frontend:${{ github.event.workflow_run.head_sha }}|" k8s/frontend/deployment.yml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Create namespaces
        run: kubectl apply -f k8s/namespaces.yml

      - name: Create ghcr-secret
        run: |
          for ns in backend frontend; do
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --namespace=$ns \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Inject Infisical token secrets
        run: |
          declare -A tokens=(
            [backend]="${{ secrets.INFISICAL_TOKEN_BACKEND }}"
            [frontend]="${{ secrets.INFISICAL_TOKEN_FRONTEND }}"
            [postgres]="${{ secrets.INFISICAL_TOKEN_POSTGRES }}"
          )
          for service in "${!tokens[@]}"; do
            kubectl create secret generic "${service}-infisical-auth" \
              --from-literal=serviceToken="${tokens[$service]}" \
              --namespace="${service}" \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Deploy to Kubernetes cluster
        run: kubectl apply -R -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n backend --timeout=120s
          kubectl rollout status deployment/frontend -n frontend --timeout=120s