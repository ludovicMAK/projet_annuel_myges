x-postgres-password: &postgres-password ${POSTGRES_PASSWORD:?create a .env file from .env.example | cp .env.example .env}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mygesdb}
      POSTGRES_USER: ${POSTGRES_USER:-mygesuser}
      POSTGRES_PASSWORD: *postgres-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mygesuser} -d ${POSTGRES_DB:-mygesdb}"]
      interval: 2s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: dev
    restart: unless-stopped
    volumes:
      - .:/app
      - node_modules_backend:/app/node_modules
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      SEED_ON_START: "true"
      SEED_PASSWORD: ${SEED_PASSWORD:-Str0ng!Password#2026}
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mygesdb}
      POSTGRES_USER: ${POSTGRES_USER:-mygesuser}
      POSTGRES_PASSWORD: *postgres-password
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: dev
    restart: unless-stopped
    volumes:
      - .:/app
      - node_modules_frontend:/app/node_modules
      - next_build:/app/infrastructure/frontend/next/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
    depends_on:
      - backend

volumes:
  postgres_data:
  node_modules_backend:
  node_modules_frontend:
  next_build:
