x-postgres-password: &postgres-password ${POSTGRES_PASSWORD:?create a .env file from .env.example | cp .env.example .env}

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/proxy_headers.conf:/etc/nginx/proxy_headers.conf:ro
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mygesdb}
      POSTGRES_USER: ${POSTGRES_USER:-mygesuser}
      POSTGRES_PASSWORD: *postgres-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mygesuser} -d ${POSTGRES_DB:-mygesdb}"]
      interval: 2s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: prod
    image: myges/backend:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mygesdb}
      POSTGRES_USER: ${POSTGRES_USER:-mygesuser}
      POSTGRES_PASSWORD: *postgres-password
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: prod
    image: myges/frontend:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://nginx:${HTTP_PORT:-80}
    depends_on:
      - backend

volumes:
  postgres_data:
